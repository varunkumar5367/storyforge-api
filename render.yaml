# DEPRECATED — StoryForge backend migrated to Windows laptop + Cloudflare Tunnel.
# This file is kept for reference only. Do not deploy to Render.
#
# See docs/CLOUDFLARE_TUNNEL_SETUP.md for the current deployment guide.

services:
  - type: web
    name: storyforge-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OUTPUT_DIR
        value: ./output
      - key: DATABASE_URL
        value: ./storyforge.db
      - key: WEB_CONCURRENCY
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"
