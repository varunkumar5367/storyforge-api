services:
  - type: web
    name: storyforge-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: VOICEFORGE_URL
        value: https://voiceforge-pzxd.onrender.com
      - key: OUTPUT_DIR
        value: ./output
      - key: DATABASE_URL
        value: ./storyforge.db
      - key: WEB_CONCURRENCY
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: storyforge-storage
      mountPath: /opt/render/project/src/output
      sizeGB: 5
